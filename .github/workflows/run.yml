name: Auto Post & Deploy Site

on:
  schedule:
    # 6時間ごと（UTC 0:00 / 6:00 / 12:00 / 18:00）
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（X に投稿しない）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      use_mock:
        description: "モックデータを使用する（テスト用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "auto-post"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v --tb=short

  run:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      site_generated: ${{ steps.run.outputs.site_generated }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main
        id: run
        env:
          PYTHONPATH: .
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          POST_ENABLED: ${{ vars.POST_ENABLED || 'false' }}
          MONETIZATION_ENABLED: ${{ vars.MONETIZATION_ENABLED || 'false' }}
          MIN_SCORE: ${{ vars.MIN_SCORE || '0.5' }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN || '3' }}
          LOG_LEVEL: "INFO"
          DRY_RUN_INPUT: ${{ inputs.dry_run || 'false' }}
          USE_MOCK_INPUT: ${{ inputs.use_mock || 'false' }}
        run: |
          if [ "$DRY_RUN_INPUT" = "true" ] || [ "$USE_MOCK_INPUT" = "true" ] || [ "$POST_ENABLED" != "true" ]; then
            python -m app.main --dry-run
          else
            python -m app.main --post
          fi
          echo "site_generated=true" >> "$GITHUB_OUTPUT"

      - name: Commit state and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/state.json logs/ site/
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4